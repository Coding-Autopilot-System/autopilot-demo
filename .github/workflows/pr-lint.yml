name: PR Lint
on:
  pull_request:
    types: ['opened', 'edited', 'reopened', 'synchronize']

permissions:
  pull-requests: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
